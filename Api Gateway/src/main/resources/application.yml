spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://USER-MANAGEMENT
              predicates:
                - Path=/auth/**
                - Path=/superadmin/**
                - Path=/admin/**
                - Path=/student/**

            - id: lesson-service
              uri: http://localhost:8091
              predicates:
                - Path=/lesson/**

            - id: post-service
              uri: lb://POST-MANAGEMENT
              predicates:
                - Path=/post/**

        discovery:
          locator:
            enabled: true

        default-filters:
  #        - AddRequestHeader=Authorization, #{request.headers.Authorization}
          - AddRequestHeader=X-Gateway, true

        logging:
          level:
            org.springframework.cloud.gateway: DEBUG
            org.springframework.cloud.loadbalancer: DEBUG

debug: true