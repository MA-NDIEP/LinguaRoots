spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "https://linguaroots.onrender.com"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true


      routes:
        - id: user-service
          uri: lb://USER-MANAGEMENT
          predicates:
            - Path=/auth/**,/superadmin/**,/admin/**,/student/**

        - id: lesson-service
          uri: lb://LESSON-MANAGEMENT
          predicates:
            - Path=/lesson/**

        - id: post-service
          uri: lb://POST-MANAGEMENT
          predicates:
            - Path=/post/**,/comment/**,/reply/**

      discovery:
        locator:
          enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG

#debug: true