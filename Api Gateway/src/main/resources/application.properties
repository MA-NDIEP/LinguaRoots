spring.application.name=Api-Gateway
server.port=8765

server.address=0.0.0.0

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

eureka.client.service-url.defaultZone=http://admin:admin123@localhost:8761/eureka

# Example for supporting up to 100MB audio/video files
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Files larger than this will be written to a temp disk location instead of RAM
spring.servlet.multipart.file-size-threshold=2MB
