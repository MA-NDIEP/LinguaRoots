<!-- nav-bar.html -->
<nav class="navbar">
  <div class="navbar-brand">
    <h1 class="page-title">{{ pageTitle }}</h1>
  </div>

  <div class="navbar-user">
    <div class="user-profile" (click)="toggleDropdown($event)" [class.open]="isDropdownOpen">
      <div class="user-avatar">{{ userInitial }}</div>
      <span class="user-name">{{ userName }}</span>
      <svg class="dropdown-arrow" width="12" height="8" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 1.5L6 6.5L11 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="dropdown-menu" *ngIf="isDropdownOpen">
      <button class="dropdown-item" (click)="goToProfile()">
        <span class="dropdown-icon">👤</span> Profile
      </button>
      <button class="dropdown-item" (click)="logout()">
        <span class="dropdown-icon">🚪</span> Logout
      </button>
    </div>
  </div>
</nav>
